{{- $source := "" -}}
{{- if .IsNamedParams -}}
{{- $source = .Get "source" | default "" -}}
{{- else -}}
{{- $source = .Get 0 | default "" -}}
{{- end -}}

<figure>
  <blockquote>
    {{- .Inner | markdownify -}}
  </blockquote>
  {{- with $source -}}
  <figcaption>—&nbsp;<cite>{{- $source | markdownify -}}</cite></figcaption>
  {{- end -}}
</figure>
