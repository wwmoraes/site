baseURL = 'https://example.org/'
languageCode = 'en-US'
title = 'My New Hugo Site'

[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["||", "||"]]
delimiters.inline = [["$$", "$$"]]

[mediaTypes."application/feed+json"]
suffixes = ["feed.json"]

[mediaTypes."application/rss+xml"]
suffixes = ["rss.xml"]

[[menus.main]]
name = 'Home'
pageRef = '/'
weight = 10

[[menus.main]]
name = 'Posts'
pageRef = '/posts'
weight = 20

[[menus.main]]
name = 'Tags'
pageRef = '/tags'
weight = 30

[module.hugoVersion]
extended = false
min = '0.146.0'

[outputFormats.RSS]
mediaType = "application/rss+xml"
noUgly = true

[outputFormats.FEED]
mediaType = "application/feed+json"
isPlainText = true

[params]
rssFullText = true
titleSeparator = "|"

[params.alerts]
default = "note"

[params.alerts.icons]
bug = ":microbe:"
caution = ":children_crossing:"
danger = ":construction:" # :hole:
edit = ":memo:"
example = ":clapper:"
failure = ":x:"
important = ":bookmark:"
info = ":book:"
note = ":pushpin:"
question = ":question:"
quote = ":speech_balloon:"
success = ":white_check_mark:"
tip = ":bulb:"
warning = ":warning:"

[params.goatcounter]
host = "goatcounter.com"
src = "https://gc.zgo.at/count.v3.js"
integrity = "sha384-QGgNMMRFTi8ul5kHJ+vXysPe8gySvSA/Y3rpXZiRLzKPIw8CWY+a3ObKmQsyDr+a"
