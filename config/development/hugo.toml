buildDrafts = true
buildFuture = true
buildExpired = true

[minify]
disableCSS = true
disableHTML = true
disableJS = true
disableJSON = true
disableSVG = true
disableXML = true
minifyOutput = false

[minify.tdewolff.html]
keepComments = false
keepDefaultAttrVals = true
keepDocumentTags = true
keepEndTags = true
keepQuotes = true
keepSpecialComments = true
keepWhitespace = false
