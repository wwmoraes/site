name: nix
description: Configures the job to setup nix and direnv
# inputs:
#   who-to-greet:  # id of input
#     description: 'Who to greet'
#     required: true
#     default: 'World'
# outputs:
#   random-number:
#     description: "Random number"
#     value: ${{ steps.random-number-generator.outputs.random-number }}
runs:
  using: composite
  steps:
  - name: direnv nix
    uses: JRMurr/direnv-nix-action@v4.2.0
    with:
      install-nix: true
      cache-store: false
      extra_nix_config: |-
        extra-substituters = https://wwmoraes.cachix.org
        extra-trusted-public-keys = wwmoraes.cachix.org-1:N38Kgu19R66Jr62aX5rS466waVzT5p/Paq1g6uFFVyM=
